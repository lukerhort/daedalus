; Daedalus flight computer — PlatformIO configuration
;
; One environment for now: the real Teensy 4.1 target.
; The SITL (Software-In-The-Loop) desktop build does NOT live here —
; it lives in sitl/ with its own plain Makefile, because the desktop
; build must never see the Arduino framework. Keeping the two builds
; in separate toolchains is what enforces the HAL boundary.

[env:teensy41]
platform = teensy
board = teensy41
framework = arduino

; C++17 per the project brief. The Teensy core defaults to gnu++14,
; so we unflag it and set gnu++17 explicitly.
build_unflags = -std=gnu++14
build_flags =
    -std=gnu++17
    -Wall
    -Wextra

; Sensor libraries (Phase 1). PlatformIO resolves transitive deps
; (Adafruit BusIO, Unified Sensor) automatically.
lib_deps =
    adafruit/Adafruit ICM20X
    adafruit/Adafruit BMP3XX Library
    sparkfun/SparkFun u-blox GNSS Arduino Library

monitor_speed = 115200

build_src_filter = +<*> -<bench/>

[env:i2c_scan]
platform = teensy
board = teensy41
framework = arduino
build_unflags = -std=gnu++14
build_flags = -std=gnu++17
build_src_filter = -<*> +<bench/i2c_scan.cpp>
monitor_speed = 115200
